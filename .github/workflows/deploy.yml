              --cache-from type=gha,scope=duncit-status${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-status${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-challenge:
    needs: changes
    if: needs.changes.outputs.challenge == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: challenge-portal
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push challenge
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file portals/challenge-portal/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-challenge:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-challenge:${{ env.SHA_TAG }} \
              --build-arg VITE_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg VITE_REQUIRED_ROLES=CHALLENGE_MANAGER \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.BUILD_GOOGLE_CLIENT_ID }} \
              --cache-from type=gha,scope=duncit-challenge${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-challenge${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-developers:
    needs: changes
    if: needs.changes.outputs.developers == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: developers-portal
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push developers
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file portals/developers/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-developers:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-developers:${{ env.SHA_TAG }} \
              --build-arg VITE_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg VITE_REQUIRED_ROLES=DEVELOPERS_MANAGER \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.BUILD_GOOGLE_CLIENT_ID }} \
              --cache-from type=gha,scope=duncit-developers${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-developers${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-earnwith:
    needs: changes
    if: needs.changes.outputs.earnwith == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript
        uses: ./.github/actions/portal-ci
        with:
          workspace: earnwith-website
          typecheck: 'tsc -b --noEmit'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push earnwith
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website/earnwith-website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-earnwith:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-earnwith:${{ env.SHA_TAG }} \
              --build-arg PUBLIC_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg PUBLIC_MWEB_URL=${{ env.MWEB_URL }} \
              --build-arg PUBLIC_MAIN_SITE_URL=${{ env.MAIN_SITE_URL }} \
              --cache-from type=gha,scope=duncit-earnwith${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-earnwith${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  # -----------------------------------------------------------
  # Single deploy job runs after whichever build jobs ran. It only
  # restarts the services whose images were rebuilt.
  # -----------------------------------------------------------
  deploy:
    needs: [changes, build-server, build-admin, build-mweb, build-website, build-partners-app, build-partners-website, build-ads-portal, build-ads-website, build-native, build-crm, build-open-wa, build-finance, build-tech, build-support, build-website-app, build-legal, build-ai, build-products, build-marketing, build-onboarding, build-hr, build-employee, build-status, build-challenge, build-developers, build-earnwith]
    if: always() && (needs.build-server.result == 'success' || needs.build-admin.result == 'success' || needs.build-mweb.result == 'success' || needs.build-website.result == 'success' || needs.build-partners-app.result == 'success' || needs.build-partners-website.result == 'success' || needs.build-ads-portal.result == 'success' || needs.build-ads-website.result == 'success' || needs.build-native.result == 'success' || needs.build-crm.result == 'success' || needs.build-open-wa.result == 'success' || needs.build-finance.result == 'success' || needs.build-tech.result == 'success' || needs.build-support.result == 'success' || needs.build-website-app.result == 'success' || needs.build-legal.result == 'success' || needs.build-ai.result == 'success' || needs.build-products.result == 'success' || needs.build-marketing.result == 'success' || needs.build-onboarding.result == 'success' || needs.build-hr.result == 'success' || needs.build-employee.result == 'success' || needs.build-status.result == 'success' || needs.build-challenge.result == 'success' || needs.build-developers.result == 'success' || needs.build-earnwith.result == 'success')
    runs-on: ubuntu-latest
    env:
      # Branch-aware deploy target: the staging stack lives side-by-side with
      # production on the same VPS (own dir, container prefix and +100 ports).
      STACK_DIR: ${{ github.ref_name == 'staging' && '/opt/duncit-staging' || '/opt/duncit' }}
      CONTAINER_PREFIX: ${{ github.ref_name == 'staging' && 'duncit-staging-' || 'duncit-' }}
      PORT_OFFSET: ${{ github.ref_name == 'staging' && '100' || '0' }}
      NGINX_SITE: ${{ github.ref_name == 'staging' && 'staging.duncit.com' || 'duncit.com' }}
      COMPOSE_SRC: ${{ github.ref_name == 'staging' && 'deploy/docker-compose.staging.yml' || 'deploy/docker-compose.yml' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          echo "SSH_PORT=$PORT" >> "$GITHUB_ENV"
          # ssh-keyscan occasionally can't reach the host on the first try; retry
          # a few times so a transient blip doesn't abort the whole deploy. If it
          # still fails, fall back to accept-new host-key checking below.
          for i in 1 2 3 4 5; do
            if ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            echo "ssh-keyscan attempt $i failed; retrying in 5s..."
            sleep 5
          done
          # Don't hard-fail the pipeline on host-key prescan; accept-new lets the
          # first real ssh connection record the key.
          printf 'Host *\n  StrictHostKeyChecking accept-new\n' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Decide which services to restart
        id: which
        run: |
          PARTS=()
          [ "${{ needs.build-server.result }}" = "success" ] && PARTS+=("server")
          [ "${{ needs.build-admin.result  }}" = "success" ] && PARTS+=("admin")
          [ "${{ needs.build-mweb.result   }}" = "success" ] && PARTS+=("mweb")
          [ "${{ needs.build-website.result }}" = "success" ] && PARTS+=("website")
          [ "${{ needs.build-partners-app.result }}" = "success" ] && PARTS+=("partners-app")
          [ "${{ needs.build-partners-website.result }}" = "success" ] && PARTS+=("partners-website")
          [ "${{ needs.build-ads-portal.result }}" = "success" ] && PARTS+=("ads-portal")
          [ "${{ needs.build-ads-website.result }}" = "success" ] && PARTS+=("ads-website")
          [ "${{ needs.build-native.result }}" = "success" ] && PARTS+=("native")
          [ "${{ needs.build-crm.result }}" = "success" ] && PARTS+=("crm")
          [ "${{ needs.build-open-wa.result }}" = "success" ] && PARTS+=("open-wa")
          [ "${{ needs.build-finance.result }}" = "success" ] && PARTS+=("finance")
          [ "${{ needs.build-tech.result }}" = "success" ] && PARTS+=("tech")
          [ "${{ needs.build-support.result }}" = "success" ] && PARTS+=("support")
          [ "${{ needs.build-website-app.result }}" = "success" ] && PARTS+=("website-app")
          [ "${{ needs.build-legal.result }}" = "success" ] && PARTS+=("legal")
          [ "${{ needs.build-ai.result }}" = "success" ] && PARTS+=("ai")
          [ "${{ needs.build-products.result }}" = "success" ] && PARTS+=("products")
          [ "${{ needs.build-marketing.result }}" = "success" ] && PARTS+=("marketing")
          [ "${{ needs.build-onboarding.result }}" = "success" ] && PARTS+=("onboarding")
          [ "${{ needs.build-hr.result }}" = "success" ] && PARTS+=("hr")
          [ "${{ needs.build-employee.result }}" = "success" ] && PARTS+=("employee")
          [ "${{ needs.build-status.result }}" = "success" ] && PARTS+=("status")
          [ "${{ needs.build-challenge.result }}" = "success" ] && PARTS+=("challenge")
          [ "${{ needs.build-developers.result }}" = "success" ] && PARTS+=("developers")
          [ "${{ needs.build-earnwith.result }}" = "success" ] && PARTS+=("earnwith")
          echo "list=${PARTS[*]}" >> "$GITHUB_OUTPUT"
          echo "Restarting: ${PARTS[*]}"

      - name: Render compose + server.env from secrets
        # server.env carries ONLY the keys the server reads from process.env
        # (Mongo/JWT/OpenWA/bootstrap). Service credentials — SMTP, ImageKit,
        # Pexels, Google OAuth/Maps, OpenAI, Twilio, Razorpay, ShipRocket,
        # Servam — are managed in the Tech portal (EnvEntry) and resolved from
        # the database at runtime; runtimeEnv.ts has NO process.env fallback
        # for them, so putting them here would be dead config. Staging prefers
        # STAGING_-prefixed secrets and falls back to the production value.
        env:
          DOCKERHUB_USERNAME:    ${{ secrets.DOCKERHUB_USERNAME }}
          MONGO_URI:             ${{ github.ref_name == 'staging' && secrets.STAGING_MONGO_URI || secrets.MONGO_URI }}
          JWT_SECRET:            ${{ github.ref_name == 'staging' && secrets.STAGING_JWT_SECRET || secrets.JWT_SECRET }}
          OPENWA_API_MASTER_KEY: ${{ github.ref_name == 'staging' && secrets.STAGING_OPENWA_API_MASTER_KEY || secrets.OPENWA_API_MASTER_KEY }}
          STAGING_SUPER_ADMIN_PASSWORD: ${{ secrets.STAGING_SUPER_ADMIN_PASSWORD }}
        run: |
          envsubst '$DOCKERHUB_USERNAME' < "${{ env.COMPOSE_SRC }}" > /tmp/docker-compose.yml
          # OpenWA gateway env (SQLite + session data on the mounted /app/data
          # volume so a connected account survives restarts). API_MASTER_KEY
          # bootstraps the gateway's own API keys; set the OPENWA_API_MASTER_KEY
          # repo secret to enable it.
          cat > /tmp/open-wa.env <<EOF
          NODE_ENV=production
          PORT=2024
          DATABASE_TYPE=sqlite
          DATABASE_NAME=/app/data/openwa.sqlite
          SESSION_DATA_PATH=/app/data/sessions
          STORAGE_TYPE=local
          STORAGE_LOCAL_PATH=/app/data/media
          API_MASTER_KEY=${OPENWA_API_MASTER_KEY}
          EOF
          cat > /tmp/server.env <<EOF
          NODE_ENV=production
          PORT=2001
          MONGO_URI=${MONGO_URI}
          JWT_SECRET=${JWT_SECRET}
          OPENWA_API_MASTER_KEY=${OPENWA_API_MASTER_KEY}
          EOF
          # Staging runs against its OWN Mongo database on the same Atlas
          # cluster — everything (users, pods, Tech-portal env entries, ...) is
          # fully separate, so values saved in the staging Tech portal apply to
          # staging only. APP_ENV lets the server self-identify (health,
          # telemetry, staging-aware status probes).
          if [ "${{ env.DEPLOY_ENV }}" = "staging" ]; then
            cat >> /tmp/server.env <<EOF
          APP_ENV=staging
          MONGO_DB_NAME=duncit-staging
          DEFAULT_SUPER_ADMIN_PASSWORD=${STAGING_SUPER_ADMIN_PASSWORD}
          EOF
          fi

      - name: Push files to VPS
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${{ env.STACK_DIR }} ${{ env.STACK_DIR }}/nginx ${{ env.STACK_DIR }}/open-wa-data"
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.STACK_DIR }}/docker-compose.yml
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/server.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.STACK_DIR }}/server.env
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/open-wa.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.STACK_DIR }}/open-wa.env
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 deploy/redeploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.STACK_DIR }}/redeploy.sh
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 deploy/nginx/${{ env.NGINX_SITE }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.STACK_DIR }}/nginx/${{ env.NGINX_SITE }}
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod 600 ${{ env.STACK_DIR }}/server.env ${{ env.STACK_DIR }}/open-wa.env; chmod +x ${{ env.STACK_DIR }}/redeploy.sh"

      - name: Configure nginx + TLS (production)
        if: env.DEPLOY_ENV == 'production'
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'REMOTE'
          set -e
          SUDO=$(command -v sudo || echo)
          # Single consolidated vhost. Install duncit.com, then drop any legacy
          # per-subdomain files so their server_name blocks can't conflict.
          $SUDO install -m 644 /opt/duncit/nginx/duncit.com /etc/nginx/sites-available/duncit.com
          $SUDO ln -sf /etc/nginx/sites-available/duncit.com /etc/nginx/sites-enabled/duncit.com
          for old in admin.duncit.com mweb.duncit.com server.duncit.com ads.duncit.com crm.duncit.com track.duncit.com finance.duncit.com tech.duncit.com partners.duncit.com partners-app.duncit.com support.duncit.com website.duncit.com legal.duncit.com ai.duncit.com products.duncit.com marketing.duncit.com; do
            $SUDO rm -f "/etc/nginx/sites-available/$old" "/etc/nginx/sites-enabled/$old"
          done
          if ! command -v certbot >/dev/null 2>&1; then
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq certbot python3-certbot-nginx
          fi
          # CORE domains have stable DNS — this cert MUST install so HTTPS for
          # every existing subdomain works. On a shared host the duncit vhost is
          # HTTP-only until certbot patches in the 443 listeners; if that step is
          # skipped, HTTPS falls through to another site's default 443 server.
          CERTBOT_CORE="-d duncit.com -d www.duncit.com -d admin.duncit.com -d mweb.duncit.com -d server.duncit.com -d partners.duncit.com -d partners-app.duncit.com -d ads.duncit.com -d ads-portal.duncit.com -d crm.duncit.com -d finance.duncit.com -d tech.duncit.com -d support.duncit.com -d website.duncit.com -d legal.duncit.com -d ai.duncit.com -d products.duncit.com -d marketing.duncit.com -d onboarding.duncit.com -d hr.duncit.com -d employee.duncit.com -d status.duncit.com -d signoz.duncit.com -d native.duncit.com -d sonarqube.duncit.com -d open-wa-server.duncit.com"
          # NEWER domains — folded in only when their DNS already resolves, so a
          # not-yet-created A record can't fail the whole (all-or-nothing) cert
          # and take HTTPS down with it.
          CERTBOT_EXTRA=""
          for d in earnwith.duncit.com challenge.duncit.com developers.duncit.com; do
            if getent hosts "$d" >/dev/null 2>&1 || host "$d" >/dev/null 2>&1; then
              CERTBOT_EXTRA="$CERTBOT_EXTRA -d $d"
            else
              echo ">>> Skipping $d in certbot (DNS not resolving yet)"
            fi
          done
          # Always (re)deploy the core cert + 443 listeners.
          $SUDO certbot --nginx --non-interactive --agree-tos --redirect --expand --cert-name duncit.com -m admin@duncit.com $CERTBOT_CORE || true
          # Best-effort expansion for the newer domains; a failure here must NOT
          # drop the core HTTPS already installed above.
          if [ -n "$CERTBOT_EXTRA" ]; then
            $SUDO certbot --nginx --non-interactive --agree-tos --redirect --expand --cert-name duncit.com -m admin@duncit.com $CERTBOT_CORE $CERTBOT_EXTRA || true
          fi
          $SUDO nginx -t
          $SUDO systemctl reload nginx
          REMOTE

      - name: Configure nginx + TLS (staging)
        if: env.DEPLOY_ENV == 'staging'
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'REMOTE'
          set -e
          SUDO=$(command -v sudo || echo)
          # Staging vhost is a SEPARATE site file next to the production one —
          # a staging deploy never rewrites duncit.com, and vice versa.
          $SUDO install -m 644 /opt/duncit-staging/nginx/staging.duncit.com /etc/nginx/sites-available/staging.duncit.com
          $SUDO ln -sf /etc/nginx/sites-available/staging.duncit.com /etc/nginx/sites-enabled/staging.duncit.com
          if ! command -v certbot >/dev/null 2>&1; then
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq certbot python3-certbot-nginx
          fi
          # Own cert (--cert-name staging.duncit.com) so the production
          # duncit.com cert is never touched by a staging run. Every staging
          # domain is DNS-gated: a missing A record just drops that one host
          # from the SAN list instead of failing the whole all-or-nothing cert.
          CERTBOT_STAGING=""
          for d in staging.duncit.com staging.server.duncit.com staging.admin.duncit.com staging.mweb.duncit.com staging.partners.duncit.com staging.partners-app.duncit.com staging.ads.duncit.com staging.ads-portal.duncit.com staging.crm.duncit.com staging.finance.duncit.com staging.tech.duncit.com staging.support.duncit.com staging.website.duncit.com staging.legal.duncit.com staging.ai.duncit.com staging.products.duncit.com staging.marketing.duncit.com staging.onboarding.duncit.com staging.hr.duncit.com staging.employee.duncit.com staging.status.duncit.com staging.native.duncit.com staging.open-wa-server.duncit.com staging.earnwith.duncit.com staging.challenge.duncit.com staging.developers.duncit.com; do
            if getent hosts "$d" >/dev/null 2>&1 || host "$d" >/dev/null 2>&1; then
              CERTBOT_STAGING="$CERTBOT_STAGING -d $d"
            else
              echo ">>> Skipping $d in certbot (DNS not resolving yet)"
            fi
          done
          if [ -n "$CERTBOT_STAGING" ]; then
            $SUDO certbot --nginx --non-interactive --agree-tos --redirect --expand --cert-name staging.duncit.com -m admin@duncit.com $CERTBOT_STAGING || true
          fi
          $SUDO nginx -t
          $SUDO systemctl reload nginx
          REMOTE

      - name: Remote redeploy (only changed services)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 5
          retry_wait_seconds: 15
          command: |
            ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "set -e; \
               echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin; \
               SERVICES='${{ steps.which.outputs.list }}' \
               STACK_DIR='${{ env.STACK_DIR }}' \
               CONTAINER_PREFIX='${{ env.CONTAINER_PREFIX }}' \
               PORT_OFFSET='${{ env.PORT_OFFSET }}' \
               ${{ env.STACK_DIR }}/redeploy.sh"

      - name: Wait for health (loop until all up)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 24
          retry_wait_seconds: 15
          command: |
            ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
              set -e
              O=${{ env.PORT_OFFSET }}
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "NAMES|${{ env.CONTAINER_PREFIX }}"
              curl -fsS http://127.0.0.1:$((2001+O))/health && echo
              # open-wa is optional/stateful — never block the gate on it.
              curl -fsSI http://127.0.0.1:$((2024+O))/ | head -1 || true
              for p in 2000 2002 2003 2004 2005 2006 2007 2008 2009 2010 2011 2012 2013 2014 2015 2016 2017 2018 2019 2020 2022 2025 2026 2027; do
                echo -n "$((p+O)): "
                curl -fsSI http://127.0.0.1:$((p+O))/ | head -1
              done
              '
