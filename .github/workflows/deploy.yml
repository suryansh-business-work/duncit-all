name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list: server,admin,mweb,website,partners-app,partners-website,ads,crm,finance,tech,support,website-app,legal,ai,products,marketing (or "all")'
        required: false
        default: 'all'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # -----------------------------------------------------------
  # Decide which services need to be (re)built based on changed paths.
  # On manual dispatch the input wins.
  # -----------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      admin:  ${{ steps.filter.outputs.admin }}
      mweb:   ${{ steps.filter.outputs.mweb }}
      website: ${{ steps.filter.outputs.website }}
      partners_app: ${{ steps.filter.outputs.partners_app }}
      partners_website: ${{ steps.filter.outputs.partners_website }}
      ads: ${{ steps.filter.outputs.ads }}
      crm: ${{ steps.filter.outputs.crm }}
      finance: ${{ steps.filter.outputs.finance }}
      tech: ${{ steps.filter.outputs.tech }}
      support: ${{ steps.filter.outputs.support }}
      website_app: ${{ steps.filter.outputs.website_app }}
      legal: ${{ steps.filter.outputs.legal }}
      ai: ${{ steps.filter.outputs.ai }}
      products: ${{ steps.filter.outputs.products }}
      marketing: ${{ steps.filter.outputs.marketing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            admin:
              - 'admin/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            mweb:
              - 'mweb-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            website:
              - 'website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            partners_app:
              - 'partners/partners-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            partners_website:
              - 'partners/partners-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            ads:
              - 'ads/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            crm:
              - 'crm/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            finance:
              - 'finance/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            tech:
              - 'tech/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            support:
              - 'support/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            website_app:
              - 'website-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            legal:
              - 'legal/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            ai:
              - 'ai/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            products:
              - 'products/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            marketing:
              - 'marketing/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'

  # -----------------------------------------------------------
  # Per-portal pipeline: each build job now runs TypeScript -> Test (via the
  # ./.github/actions/portal-ci composite) -> Build, independently. A red
  # typecheck/test for one portal stops only that portal's image push, so its
  # previous :latest image and running container are left untouched while the
  # other portals continue. (CRM keeps its dedicated crm-tests gate.)
  # -----------------------------------------------------------
  build-server:
    needs: changes
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: server
          typecheck: 'tsc -p tsconfig.json --noEmit'
          test: 'test'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push server
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file server/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-server:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-server:${{ github.sha }} \
              --cache-from type=gha,scope=duncit-server \
              --cache-to   type=gha,scope=duncit-server,mode=max \
              --push .

  build-admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: admin
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push admin
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file admin/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-admin:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-admin:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ secrets.GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-admin \
              --cache-to   type=gha,scope=duncit-admin,mode=max \
              --push .

  build-mweb:
    needs: changes
    if: needs.changes.outputs.mweb == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: mweb-app
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push mweb
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file mweb-app/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-mweb:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-mweb:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ secrets.GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-mweb \
              --cache-to   type=gha,scope=duncit-mweb,mode=max \
              --push .

  build-website:
    needs: changes
    if: needs.changes.outputs.website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript
        uses: ./.github/actions/portal-ci
        with:
          workspace: duncit.com
          typecheck: 'tsc -b --noEmit'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website:${{ github.sha }} \
              --cache-from type=gha,scope=duncit-website \
              --cache-to   type=gha,scope=duncit-website,mode=max \
              --push .

  build-partners-app:
    needs: changes
    if: needs.changes.outputs.partners_app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: partners-app
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push partners app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file partners/partners-app/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-app:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-app:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ secrets.GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-partners-app \
              --cache-to   type=gha,scope=duncit-partners-app,mode=max \
              --push .

  build-partners-website:
    needs: changes
    if: needs.changes.outputs.partners_website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript
        uses: ./.github/actions/portal-ci
        with:
          workspace: partners-website
          typecheck: 'tsc -b --noEmit'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push partners website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file partners/partners-website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-website:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-website:${{ github.sha }} \
              --cache-from type=gha,scope=duncit-partners-website \
              --cache-to   type=gha,scope=duncit-partners-website,mode=max \
              --push .

  build-ads:
    needs: changes
    if: needs.changes.outputs.ads == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: ads
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push ads
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file ads/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-ads:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-ads:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=ADS_MANAGER \
              --cache-from type=gha,scope=duncit-ads \
              --cache-to   type=gha,scope=duncit-ads,mode=max \
              --push .

  # -----------------------------------------------------------
  # CRM-specific test gate (decoupled — only runs when crm/ changed).
  # Vitest unit/component tests + Cypress e2e specs both live under
  # crm/__tests__/. build-crm waits on this job's success so a red test
  # prevents the docker image from being pushed.
  # -----------------------------------------------------------
  crm-tests:
    needs: changes
    if: needs.changes.outputs.crm == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        # pnpm sometimes skips Cypress's `postinstall` download under
        # `--frozen-lockfile`, and `cypress-io/github-action@v6` with
        # `install: false` only verifies — it doesn't fetch the binary.
        # Run an explicit install so the runner cache at
        # `/home/runner/.cache/Cypress/<version>/Cypress` always exists.
        working-directory: crm
        run: pnpm exec cypress install

      - name: Type-check CRM source
        working-directory: crm
        run: pnpm exec tsc -b --noEmit

      - name: Type-check Cypress specs
        working-directory: crm
        run: pnpm exec tsc --noEmit -p __tests__/e2e/tsconfig.json

      - name: Run vitest unit + component tests
        working-directory: crm
        run: pnpm exec vitest run --reporter=default

      - name: Build CRM bundle for Cypress preview
        working-directory: crm
        # `build:e2e` forces VITE_GRAPHQL_URL=/graphql (via .env.e2e) so the
        # bundled app talks same-origin and cy.intercept catches every
        # GraphQL call without a CORS preflight hitting server.duncit.com.
        run: pnpm build:e2e

      - name: Run Cypress e2e specs
        uses: cypress-io/github-action@v6
        with:
          working-directory: crm
          install: false
          config-file: __tests__/e2e/cypress.config.ts
          start: pnpm preview
          wait-on: 'http://localhost:2007'
          wait-on-timeout: 120
          browser: chrome

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crm-cypress-screenshots
          path: crm/cypress-artifacts/screenshots
          if-no-files-found: ignore

  build-crm:
    needs: [changes, crm-tests]
    if: needs.changes.outputs.crm == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push crm
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file crm/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-crm:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-crm:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=CRM_MANAGER \
              --cache-from type=gha,scope=duncit-crm \
              --cache-to   type=gha,scope=duncit-crm,mode=max \
              --push .

  build-finance:
    needs: changes
    if: needs.changes.outputs.finance == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: finance
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push finance
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file finance/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-finance:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-finance:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=FINANCE_MANAGER \
              --cache-from type=gha,scope=duncit-finance \
              --cache-to   type=gha,scope=duncit-finance,mode=max \
              --push .

  build-tech:
    needs: changes
    if: needs.changes.outputs.tech == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: tech
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push tech
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file tech/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-tech:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-tech:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=TECH_MANAGER \
              --cache-from type=gha,scope=duncit-tech \
              --cache-to   type=gha,scope=duncit-tech,mode=max \
              --push .

  build-support:
    needs: changes
    if: needs.changes.outputs.support == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: support
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push support
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file support/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-support:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-support:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=SUPPORT_MANAGER \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --cache-from type=gha,scope=duncit-support \
              --cache-to   type=gha,scope=duncit-support,mode=max \
              --push .

  build-website-app:
    needs: changes
    if: needs.changes.outputs.website_app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: website-app
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push website-app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website-app/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website-app:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website-app:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=WEBSITE_MANAGER \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --cache-from type=gha,scope=duncit-website-app \
              --cache-to   type=gha,scope=duncit-website-app,mode=max \
              --push .

  build-legal:
    needs: changes
    if: needs.changes.outputs.legal == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: legal
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push legal
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file legal/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-legal:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-legal:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_REQUIRED_ROLES=LEGAL_MANAGER \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --cache-from type=gha,scope=duncit-legal \
              --cache-to   type=gha,scope=duncit-legal,mode=max \
              --push .

