              --cache-to   type=gha,scope=duncit-marketing,mode=max \
              --push .

  # -----------------------------------------------------------
  # Single deploy job runs after whichever build jobs ran. It only
  # restarts the services whose images were rebuilt.
  # -----------------------------------------------------------
  deploy:
    needs: [changes, build-server, build-admin, build-mweb, build-website, build-partners-app, build-partners-website, build-ads, build-crm, build-finance, build-tech, build-support, build-website-app, build-legal, build-ai, build-products, build-marketing]
    if: always() && (needs.build-server.result == 'success' || needs.build-admin.result == 'success' || needs.build-mweb.result == 'success' || needs.build-website.result == 'success' || needs.build-partners-app.result == 'success' || needs.build-partners-website.result == 'success' || needs.build-ads.result == 'success' || needs.build-crm.result == 'success' || needs.build-finance.result == 'success' || needs.build-tech.result == 'success' || needs.build-support.result == 'success' || needs.build-website-app.result == 'success' || needs.build-legal.result == 'success' || needs.build-ai.result == 'success' || needs.build-products.result == 'success' || needs.build-marketing.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          echo "SSH_PORT=$PORT" >> "$GITHUB_ENV"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Decide which services to restart
        id: which
        run: |
          PARTS=()
          [ "${{ needs.build-server.result }}" = "success" ] && PARTS+=("server")
          [ "${{ needs.build-admin.result  }}" = "success" ] && PARTS+=("admin")
          [ "${{ needs.build-mweb.result   }}" = "success" ] && PARTS+=("mweb")
          [ "${{ needs.build-website.result }}" = "success" ] && PARTS+=("website")
          [ "${{ needs.build-partners-app.result }}" = "success" ] && PARTS+=("partners-app")
          [ "${{ needs.build-partners-website.result }}" = "success" ] && PARTS+=("partners-website")
          [ "${{ needs.build-ads.result }}" = "success" ] && PARTS+=("ads")
          [ "${{ needs.build-crm.result }}" = "success" ] && PARTS+=("crm")
          [ "${{ needs.build-finance.result }}" = "success" ] && PARTS+=("finance")
          [ "${{ needs.build-tech.result }}" = "success" ] && PARTS+=("tech")
          [ "${{ needs.build-support.result }}" = "success" ] && PARTS+=("support")
          [ "${{ needs.build-website-app.result }}" = "success" ] && PARTS+=("website-app")
          [ "${{ needs.build-legal.result }}" = "success" ] && PARTS+=("legal")
          [ "${{ needs.build-ai.result }}" = "success" ] && PARTS+=("ai")
          [ "${{ needs.build-products.result }}" = "success" ] && PARTS+=("products")
          [ "${{ needs.build-marketing.result }}" = "success" ] && PARTS+=("marketing")
          echo "list=${PARTS[*]}" >> "$GITHUB_OUTPUT"
          echo "Restarting: ${PARTS[*]}"

      - name: Render compose + server.env from secrets
        env:
          DOCKERHUB_USERNAME:    ${{ secrets.DOCKERHUB_USERNAME }}
          MONGO_URI:             ${{ secrets.MONGO_URI }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          SMTP_FROM:             ${{ secrets.SMTP_FROM }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          IMAGEKIT_PUBLIC_KEY:   ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
          IMAGEKIT_PRIVATE_KEY:  ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_URL_ENDPOINT: ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          envsubst '$DOCKERHUB_USERNAME' < deploy/docker-compose.yml > /tmp/docker-compose.yml
          cat > /tmp/server.env <<EOF
          NODE_ENV=production
          PORT=2001
          MONGO_URI=${MONGO_URI}
          JWT_SECRET=${JWT_SECRET}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
          IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
          IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
          PEXELS_API_KEY=${PEXELS_API_KEY}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          EOF

      - name: Push files to VPS
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/duncit /opt/duncit/nginx"
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/docker-compose.yml
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/server.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/server.env
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 deploy/redeploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/redeploy.sh
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 deploy/nginx/duncit.com \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/nginx/duncit.com
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'REMOTE'
          set -e
          chmod 600 /opt/duncit/server.env
          chmod +x /opt/duncit/redeploy.sh
          SUDO=$(command -v sudo || echo)
          # Single consolidated vhost. Install duncit.com, then drop any legacy
          # per-subdomain files so their server_name blocks can't conflict.
          $SUDO install -m 644 /opt/duncit/nginx/duncit.com /etc/nginx/sites-available/duncit.com
          $SUDO ln -sf /etc/nginx/sites-available/duncit.com /etc/nginx/sites-enabled/duncit.com
          for old in admin.duncit.com mweb.duncit.com server.duncit.com ads.duncit.com crm.duncit.com track.duncit.com finance.duncit.com tech.duncit.com partners.duncit.com partners-app.duncit.com support.duncit.com website.duncit.com legal.duncit.com ai.duncit.com products.duncit.com marketing.duncit.com; do
            $SUDO rm -f "/etc/nginx/sites-available/$old" "/etc/nginx/sites-enabled/$old"
          done
          if ! command -v certbot >/dev/null 2>&1; then
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq certbot python3-certbot-nginx
          fi
          CERTBOT_DOMAINS="-d duncit.com -d www.duncit.com -d admin.duncit.com -d mweb.duncit.com -d server.duncit.com -d partners.duncit.com -d partners-app.duncit.com -d ads.duncit.com -d crm.duncit.com -d finance.duncit.com -d tech.duncit.com -d support.duncit.com -d website.duncit.com -d legal.duncit.com -d ai.duncit.com -d products.duncit.com -d marketing.duncit.com"
          if ! $SUDO test -d /etc/letsencrypt/live/duncit.com; then
            $SUDO certbot --nginx --non-interactive --agree-tos --redirect --cert-name duncit.com -m admin@duncit.com $CERTBOT_DOMAINS || true
          else
            $SUDO certbot --nginx --non-interactive --agree-tos --redirect --expand --cert-name duncit.com -m admin@duncit.com $CERTBOT_DOMAINS || true
          fi
          $SUDO nginx -t
          $SUDO systemctl reload nginx
          REMOTE

      - name: Remote redeploy (only changed services)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 5
          retry_wait_seconds: 15
          command: |
            ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "set -e; \
               echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin; \
               SERVICES='${{ steps.which.outputs.list }}' /opt/duncit/redeploy.sh"

      - name: Wait for health (loop until all up)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 24
          retry_wait_seconds: 15
          command: |
            ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
              set -e
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
              curl -fsS http://127.0.0.1:2001/health && echo
              curl -fsSI http://127.0.0.1:2002/ | head -1
              curl -fsSI http://127.0.0.1:2003/ | head -1
              curl -fsSI http://127.0.0.1:2000/ | head -1
              curl -fsSI http://127.0.0.1:2004/ | head -1
              curl -fsSI http://127.0.0.1:2005/ | head -1
              curl -fsSI http://127.0.0.1:2006/ | head -1
              curl -fsSI http://127.0.0.1:2007/ | head -1
              curl -fsSI http://127.0.0.1:2008/ | head -1
              curl -fsSI http://127.0.0.1:2009/ | head -1
              curl -fsSI http://127.0.0.1:2010/ | head -1
              curl -fsSI http://127.0.0.1:2011/ | head -1
              curl -fsSI http://127.0.0.1:2012/ | head -1
              curl -fsSI http://127.0.0.1:2013/ | head -1
              curl -fsSI http://127.0.0.1:2014/ | head -1
              curl -fsSI http://127.0.0.1:2015/ | head -1
              '
