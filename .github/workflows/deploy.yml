name: deploy

on:
  push:
    branches: [main, master, staging]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list: server,admin,mweb,website,partners-app,partners-website,ads-portal,ads-website,native,crm,finance,tech,support,website-app,legal,ai,products,marketing,challenge,developers,earnwith (or "all")'
        required: false
        default: 'all'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  # ---- branch-aware deployment identity --------------------------------------
  # Pushes to `staging` deploy the full replica stack to staging.*.duncit.com:
  # images are tagged :staging with the staging URLs baked into every frontend
  # bundle (API base URLs are compile-time, so prod images are NOT reusable),
  # and the deploy job targets /opt/duncit-staging on the same VPS (host ports =
  # production + 100). main/master deploys production exactly as before.
  DEPLOY_ENV: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
  IMAGE_TAG: ${{ github.ref_name == 'staging' && 'staging' || 'latest' }}
  SHA_TAG: ${{ github.ref_name == 'staging' && format('staging-{0}', github.sha) || github.sha }}
  # Separate buildx cache scopes — staging layers (different build-args) must
  # not evict the production cache.
  SCOPE_SUFFIX: ${{ github.ref_name == 'staging' && '-staging' || '' }}
  GRAPHQL_URL: ${{ github.ref_name == 'staging' && 'https://staging.server.duncit.com/graphql' || 'https://server.duncit.com/graphql' }}
  SERVER_URL: ${{ github.ref_name == 'staging' && 'https://staging.server.duncit.com' || 'https://server.duncit.com' }}
  MAIN_SITE_URL: ${{ github.ref_name == 'staging' && 'https://staging.duncit.com' || 'https://duncit.com' }}
  MWEB_URL: ${{ github.ref_name == 'staging' && 'https://staging.mweb.duncit.com' || 'https://mweb.duncit.com' }}
  PARTNERS_SITE_URL: ${{ github.ref_name == 'staging' && 'https://staging.partners.duncit.com' || 'https://partners.duncit.com' }}
  PARTNERS_APP_URL: ${{ github.ref_name == 'staging' && 'https://staging.partners-app.duncit.com' || 'https://partners-app.duncit.com' }}
  ADS_SITE_URL: ${{ github.ref_name == 'staging' && 'https://staging.ads.duncit.com' || 'https://ads.duncit.com' }}
  ADS_PORTAL_URL: ${{ github.ref_name == 'staging' && 'https://staging.ads-portal.duncit.com' || 'https://ads-portal.duncit.com' }}
  EARNWITH_URL: ${{ github.ref_name == 'staging' && 'https://staging.earnwith.duncit.com' || 'https://earnwith.duncit.com' }}
  # Build-time Google creds baked into the frontend bundles. Staging builds
  # prefer the STAGING_-prefixed secret and fall back to the production one
  # when it is not set. (Runtime service creds — SMTP/ImageKit/OpenAI/... —
  # do NOT live here at all: the server reads them from the Tech portal's
  # env entries, and each environment has its own database.)
  BUILD_GOOGLE_CLIENT_ID: ${{ github.ref_name == 'staging' && secrets.STAGING_GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
  BUILD_GOOGLE_MAP_API: ${{ github.ref_name == 'staging' && secrets.STAGING_GOOGLE_MAP_API || secrets.GOOGLE_MAP_API }}

jobs:
  # -----------------------------------------------------------
  # Decide which services need to be (re)built based on changed paths.
  # On manual dispatch the input wins.
  # -----------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      admin:  ${{ steps.filter.outputs.admin }}
      mweb:   ${{ steps.filter.outputs.mweb }}
      website: ${{ steps.filter.outputs.website }}
      partners_app: ${{ steps.filter.outputs.partners_app }}
      partners_website: ${{ steps.filter.outputs.partners_website }}
      ads_portal: ${{ steps.filter.outputs.ads_portal }}
      ads_website: ${{ steps.filter.outputs.ads_website }}
      native: ${{ steps.filter.outputs.native }}
      crm: ${{ steps.filter.outputs.crm }}
      open_wa: ${{ steps.filter.outputs.open_wa }}
      finance: ${{ steps.filter.outputs.finance }}
      tech: ${{ steps.filter.outputs.tech }}
      support: ${{ steps.filter.outputs.support }}
      website_app: ${{ steps.filter.outputs.website_app }}
      legal: ${{ steps.filter.outputs.legal }}
      ai: ${{ steps.filter.outputs.ai }}
      products: ${{ steps.filter.outputs.products }}
      marketing: ${{ steps.filter.outputs.marketing }}
      onboarding: ${{ steps.filter.outputs.onboarding }}
      hr: ${{ steps.filter.outputs.hr }}
      employee: ${{ steps.filter.outputs.employee }}
      status: ${{ steps.filter.outputs.status }}
      challenge: ${{ steps.filter.outputs.challenge }}
      developers: ${{ steps.filter.outputs.developers }}
      earnwith: ${{ steps.filter.outputs.earnwith }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            admin:
              - 'portals/admin/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            mweb:
              - 'app/mweb/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            website:
              - 'website/main-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            partners_app:
              - 'portals/partners-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            partners_website:
              - 'website/partners-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            ads_portal:
              - 'portals/ads-portal/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            ads_website:
              - 'website/ads-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            native:
              - 'app/mobile-app/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            crm:
              - 'portals/crm/**'
              - '!portals/crm/open-wa-server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            open_wa:
              - 'portals/crm/open-wa-server/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            finance:
              - 'portals/finance/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            tech:
              - 'portals/tech/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            support:
              - 'portals/support/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            website_app:
              - 'portals/website-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            legal:
              - 'portals/legal/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            ai:
              - 'portals/ai/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            products:
              - 'portals/products/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            marketing:
              - 'portals/marketing/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            onboarding:
              - 'portals/onboarding/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            hr:
              - 'portals/hr/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            employee:
              - 'portals/employee/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            status:
              - 'website/status-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            challenge:
              - 'portals/challenge-portal/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            developers:
              - 'portals/developers/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            earnwith:
              - 'website/earnwith-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'

  # -----------------------------------------------------------
  # Per-portal pipeline: each build job now runs TypeScript -> Test (via the
  # ./.github/actions/portal-ci composite) -> Build, independently. A red
  # typecheck/test for one portal stops only that portal's image push, so its
  # previous :latest image and running container are left untouched while the
  # other portals continue. (CRM keeps its dedicated crm-tests gate.)
  # -----------------------------------------------------------
  build-server:
    needs: changes
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: server
          typecheck: 'tsc -p tsconfig.json --noEmit'
          test: 'test:ci'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push server
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file server/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-server:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-server:${{ env.SHA_TAG }} \
              --cache-from type=gha,scope=duncit-server${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-server${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: admin
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push admin
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file portals/admin/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-admin:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-admin:${{ env.SHA_TAG }} \
              --build-arg VITE_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.BUILD_GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ env.BUILD_GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-admin${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-admin${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-mweb:
    needs: changes
    if: needs.changes.outputs.mweb == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: mweb-app
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push mweb
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file app/mweb/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-mweb:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-mweb:${{ env.SHA_TAG }} \
              --build-arg VITE_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.BUILD_GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ env.BUILD_GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-mweb${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-mweb${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-website:
    needs: changes
    if: needs.changes.outputs.website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript
        uses: ./.github/actions/portal-ci
        with:
          workspace: duncit.com
          typecheck: 'tsc -b --noEmit'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website/main-website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website:${{ env.SHA_TAG }} \
              --build-arg PUBLIC_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg PUBLIC_SITE_URL=${{ env.MAIN_SITE_URL }} \
              --build-arg PUBLIC_MWEB_URL=${{ env.MWEB_URL }} \
              --build-arg PUBLIC_PARTNERS_SITE_URL=${{ env.PARTNERS_SITE_URL }} \
              --build-arg PUBLIC_ADS_SITE_URL=${{ env.ADS_SITE_URL }} \
              --build-arg PUBLIC_EARNWITH_URL=${{ env.EARNWITH_URL }} \
              --cache-from type=gha,scope=duncit-website${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-website${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-partners-app:
    needs: changes
    if: needs.changes.outputs.partners_app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: partners-app
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push partners app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file portals/partners-app/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-app:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-app:${{ env.SHA_TAG }} \
              --build-arg VITE_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.BUILD_GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ env.BUILD_GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-partners-app${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-partners-app${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-partners-website:
    needs: changes
    if: needs.changes.outputs.partners_website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript
        uses: ./.github/actions/portal-ci
        with:
          workspace: partners-website
          typecheck: 'tsc -b --noEmit'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push partners website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website/partners-website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-website:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-website:${{ env.SHA_TAG }} \
              --build-arg PUBLIC_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg PUBLIC_PARTNERS_SITE_URL=${{ env.PARTNERS_SITE_URL }} \
              --build-arg PUBLIC_MAIN_SITE_URL=${{ env.MAIN_SITE_URL }} \
              --build-arg PUBLIC_PARTNERS_APP_URL=${{ env.PARTNERS_APP_URL }} \
              --cache-from type=gha,scope=duncit-partners-website${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-partners-website${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-ads-portal:
    needs: changes
    if: needs.changes.outputs.ads_portal == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript + Test
        uses: ./.github/actions/portal-ci
        with:
          workspace: ads-portal
          typecheck: 'tsc -b --noEmit'
          test: 'test:forms'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push ads portal
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file portals/ads-portal/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-ads-portal:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-ads-portal:${{ env.SHA_TAG }} \
              --build-arg VITE_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg VITE_REQUIRED_ROLES=ADS_MANAGER \
              --cache-from type=gha,scope=duncit-ads-portal${{ env.SCOPE_SUFFIX }} \
              --cache-to   type=gha,scope=duncit-ads-portal${{ env.SCOPE_SUFFIX }},mode=max \
              --push .

  build-ads-website:
    needs: changes
    if: needs.changes.outputs.ads_website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TypeScript
        uses: ./.github/actions/portal-ci
        with:
          workspace: ads-website
          typecheck: 'tsc -b --noEmit'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push ads website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website/ads-website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-ads-website:${{ env.IMAGE_TAG }} \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-ads-website:${{ env.SHA_TAG }} \
              --build-arg PUBLIC_GRAPHQL_URL=${{ env.GRAPHQL_URL }} \
              --build-arg PUBLIC_ADS_PORTAL_URL=${{ env.ADS_PORTAL_URL }} \
              --build-arg PUBLIC_MAIN_SITE_URL=${{ env.MAIN_SITE_URL }} \
