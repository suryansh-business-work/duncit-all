name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list: server,admin,mweb,website,partners-app,partners-website (or "all")'
        required: false
        default: 'all'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # -----------------------------------------------------------
  # Decide which services need to be (re)built based on changed paths.
  # On manual dispatch the input wins.
  # -----------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      admin:  ${{ steps.filter.outputs.admin }}
      mweb:   ${{ steps.filter.outputs.mweb }}
      website: ${{ steps.filter.outputs.website }}
      partners_app: ${{ steps.filter.outputs.partners_app }}
      partners_website: ${{ steps.filter.outputs.partners_website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            admin:
              - 'admin/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            mweb:
              - 'mweb-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            website:
              - 'website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            partners_app:
              - 'partners/partners-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            partners_website:
              - 'partners/partners-website/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'

  # -----------------------------------------------------------
  # Lightweight typecheck. Workspace builds catch TS errors before docker.
  # -----------------------------------------------------------
  typecheck:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --recursive --if-present build

  # -----------------------------------------------------------
  # Build & push each image only when its sources changed.
  # -----------------------------------------------------------
  build-server:
    needs: [changes, typecheck]
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push server
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file server/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-server:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-server:${{ github.sha }} \
              --cache-from type=gha,scope=duncit-server \
              --cache-to   type=gha,scope=duncit-server,mode=max \
              --push .

  build-admin:
    needs: [changes, typecheck]
    if: needs.changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push admin
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file admin/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-admin:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-admin:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ secrets.GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-admin \
              --cache-to   type=gha,scope=duncit-admin,mode=max \
              --push .

  build-mweb:
    needs: [changes, typecheck]
    if: needs.changes.outputs.mweb == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push mweb
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file mweb-app/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-mweb:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-mweb:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ secrets.GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-mweb \
              --cache-to   type=gha,scope=duncit-mweb,mode=max \
              --push .

  build-website:
    needs: [changes, typecheck]
    if: needs.changes.outputs.website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-website:${{ github.sha }} \
              --cache-from type=gha,scope=duncit-website \
              --cache-to   type=gha,scope=duncit-website,mode=max \
              --push .

  build-partners-app:
    needs: [changes, typecheck]
    if: needs.changes.outputs.partners_app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push partners app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file partners/partners-app/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-app:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-app:${{ github.sha }} \
              --build-arg VITE_GRAPHQL_URL=https://server.duncit.com/graphql \
              --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              --build-arg VITE_GOOGLE_MAP_API=${{ secrets.GOOGLE_MAP_API }} \
              --cache-from type=gha,scope=duncit-partners-app \
              --cache-to   type=gha,scope=duncit-partners-app,mode=max \
              --push .

  build-partners-website:
    needs: [changes, typecheck]
    if: needs.changes.outputs.partners_website == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push partners website
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx build \
              --file partners/partners-website/Dockerfile \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-website:latest \
              --tag ${{ env.IMAGE_NAMESPACE }}/duncit-partners-website:${{ github.sha }} \
              --cache-from type=gha,scope=duncit-partners-website \
              --cache-to   type=gha,scope=duncit-partners-website,mode=max \
              --push .

  # -----------------------------------------------------------
  # Single deploy job runs after whichever build jobs ran. It only
  # restarts the services whose images were rebuilt.
  # -----------------------------------------------------------
  deploy:
    needs: [changes, build-server, build-admin, build-mweb, build-website, build-partners-app, build-partners-website]
    if: always() && (needs.build-server.result == 'success' || needs.build-admin.result == 'success' || needs.build-mweb.result == 'success' || needs.build-website.result == 'success' || needs.build-partners-app.result == 'success' || needs.build-partners-website.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          echo "SSH_PORT=$PORT" >> "$GITHUB_ENV"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Decide which services to restart
        id: which
        run: |
          PARTS=()
          [ "${{ needs.build-server.result }}" = "success" ] && PARTS+=("server")
          [ "${{ needs.build-admin.result  }}" = "success" ] && PARTS+=("admin")
          [ "${{ needs.build-mweb.result   }}" = "success" ] && PARTS+=("mweb")
          [ "${{ needs.build-website.result }}" = "success" ] && PARTS+=("website")
          [ "${{ needs.build-partners-app.result }}" = "success" ] && PARTS+=("partners-app")
          [ "${{ needs.build-partners-website.result }}" = "success" ] && PARTS+=("partners-website")
          echo "list=${PARTS[*]}" >> "$GITHUB_OUTPUT"
          echo "Restarting: ${PARTS[*]}"

      - name: Render compose + server.env from secrets
        env:
          DOCKERHUB_USERNAME:    ${{ secrets.DOCKERHUB_USERNAME }}
          MONGO_URI:             ${{ secrets.MONGO_URI }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          SMTP_FROM:             ${{ secrets.SMTP_FROM }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          IMAGEKIT_PUBLIC_KEY:   ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
          IMAGEKIT_PRIVATE_KEY:  ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_URL_ENDPOINT: ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          envsubst '$DOCKERHUB_USERNAME' < deploy/docker-compose.yml > /tmp/docker-compose.yml
          cat > /tmp/server.env <<EOF
          NODE_ENV=production
          PORT=2001
          MONGO_URI=${MONGO_URI}
          JWT_SECRET=${JWT_SECRET}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
          IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
          IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
          PEXELS_API_KEY=${PEXELS_API_KEY}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          EOF

      - name: Push files to VPS
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/duncit /opt/duncit/nginx"
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/docker-compose.yml
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 /tmp/server.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/server.env
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 deploy/redeploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/redeploy.sh
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 deploy/nginx/duncit.com \
            deploy/nginx/admin.duncit.com \
            deploy/nginx/mweb.duncit.com \
            deploy/nginx/server.duncit.com \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/duncit/nginx/
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<'REMOTE'
          set -e
          chmod 600 /opt/duncit/server.env
          chmod +x /opt/duncit/redeploy.sh
          SUDO=$(command -v sudo || echo)
          for site in duncit.com admin.duncit.com mweb.duncit.com server.duncit.com; do
            $SUDO install -m 644 "/opt/duncit/nginx/$site" "/etc/nginx/sites-available/$site"
            $SUDO ln -sf "/etc/nginx/sites-available/$site" "/etc/nginx/sites-enabled/$site"
          done
          if ! command -v certbot >/dev/null 2>&1; then
            $SUDO apt-get update -qq
            $SUDO apt-get install -y -qq certbot python3-certbot-nginx
          fi
          CERTBOT_DOMAINS="-d duncit.com -d www.duncit.com -d admin.duncit.com -d mweb.duncit.com -d server.duncit.com -d partners.duncit.com -d partners-app.duncit.com"
          if ! $SUDO test -d /etc/letsencrypt/live/duncit.com; then
            $SUDO certbot --nginx --non-interactive --agree-tos --redirect --cert-name duncit.com -m admin@duncit.com $CERTBOT_DOMAINS || true
          else
            $SUDO certbot --nginx --non-interactive --agree-tos --redirect --expand --cert-name duncit.com -m admin@duncit.com $CERTBOT_DOMAINS || true
          fi
          $SUDO nginx -t
          $SUDO systemctl reload nginx
          REMOTE

      - name: Remote redeploy (only changed services)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 5
          retry_wait_seconds: 15
          command: |
            ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "set -e; \
               echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin; \
               SERVICES='${{ steps.which.outputs.list }}' /opt/duncit/redeploy.sh"

      - name: Wait for health (loop until all up)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 24
          retry_wait_seconds: 15
          command: |
            ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
              set -e
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
              curl -fsS http://127.0.0.1:2001/health && echo
              curl -fsSI http://127.0.0.1:2002/ | head -1
              curl -fsSI http://127.0.0.1:2003/ | head -1
              curl -fsSI http://127.0.0.1:2000/ | head -1
              curl -fsSI http://127.0.0.1:2004/ | head -1
              curl -fsSI http://127.0.0.1:2005/ | head -1
              '
