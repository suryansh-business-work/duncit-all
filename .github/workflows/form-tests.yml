name: Form Tests

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'portals/admin/**'
      - 'app/mweb/**'
      - 'portals/ads-portal/**'
      - 'portals/crm/**'
      - 'portals/finance/**'
      - 'portals/tech/**'
      - 'portals/support/**'
      - 'portals/website-app/**'
      - 'portals/legal/**'
      - 'portals/ai/**'
      - 'portals/products/**'
      - 'portals/marketing/**'
      - 'portals/onboarding/**'
      - 'portals/hr/**'
      - 'portals/employee/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/form-tests.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'portals/admin/**'
      - 'app/mweb/**'
      - 'portals/ads-portal/**'
      - 'portals/crm/**'
      - 'portals/finance/**'
      - 'portals/tech/**'
      - 'portals/support/**'
      - 'portals/website-app/**'
      - 'portals/legal/**'
      - 'portals/ai/**'
      - 'portals/products/**'
      - 'portals/marketing/**'
      - 'portals/onboarding/**'
      - 'portals/hr/**'
      - 'portals/employee/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

concurrency:
  group: form-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-forms:
    name: Vitest schema & form tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: admin, dir: admin }
          - { name: mweb-app, dir: mweb-app }
          - { name: ads-portal, dir: ads/ads-portal }
          - { name: crm, dir: crm }
          - { name: finance, dir: finance }
          - { name: tech, dir: tech }
          - { name: support, dir: support }
          - { name: website-app, dir: website-app }
          - { name: legal, dir: legal }
          - { name: ai, dir: ai }
          - { name: products, dir: products }
          - { name: marketing, dir: marketing }
          - { name: onboarding, dir: onboarding }
          - { name: hr, dir: hr }
          - { name: employee, dir: employee }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run form tests (${{ matrix.name }})
        working-directory: ${{ matrix.dir }}
        run: pnpm exec vitest run --reporter=default --reporter=junit --outputFile=${{ github.workspace }}/test-results/${{ matrix.name }}-junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-tests-${{ matrix.name }}
          path: test-results/${{ matrix.name }}-junit.xml
          if-no-files-found: ignore

  typecheck:
    name: Typecheck (admin + mweb-app)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck admin
        working-directory: portals/admin
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck mweb-app
        working-directory: app/mweb
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck ads-portal
        working-directory: portals/ads-portal
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck crm
        working-directory: portals/crm
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck finance
        working-directory: portals/finance
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck tech
        working-directory: portals/tech
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck support
        working-directory: portals/support
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck website-app
        working-directory: portals/website-app
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck legal
        working-directory: portals/legal
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck ai
        working-directory: portals/ai
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck products
        working-directory: portals/products
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck marketing
        working-directory: portals/marketing
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck onboarding
        working-directory: portals/onboarding
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck hr
        working-directory: portals/hr
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck employee
        working-directory: portals/employee
        run: pnpm exec tsc -b --noEmit
