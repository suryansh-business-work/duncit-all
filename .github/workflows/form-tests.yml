name: Form Tests

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'admin/**'
      - 'mweb-app/**'
      - 'ads/**'
      - 'crm/**'
      - 'track/**'
      - 'tech/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/form-tests.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'admin/**'
      - 'mweb-app/**'
      - 'ads/**'
      - 'crm/**'
      - 'track/**'
      - 'tech/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

concurrency:
  group: form-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-forms:
    name: Vitest schema & form tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        workspace: [admin, mweb-app, ads, crm, track, tech]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run form tests (${{ matrix.workspace }})
        working-directory: ${{ matrix.workspace }}
        run: pnpm exec vitest run --reporter=default --reporter=junit --outputFile=../test-results/${{ matrix.workspace }}-junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-tests-${{ matrix.workspace }}
          path: test-results/${{ matrix.workspace }}-junit.xml
          if-no-files-found: ignore

  typecheck:
    name: Typecheck (admin + mweb-app)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck admin
        working-directory: admin
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck mweb-app
        working-directory: mweb-app
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck ads
        working-directory: ads
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck crm
        working-directory: crm
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck track
        working-directory: track
        run: pnpm exec tsc -b --noEmit

      - name: Typecheck tech
        working-directory: tech
        run: pnpm exec tsc -b --noEmit
