name: SonarQube Scan

on:
  push:
    branches:
      - main
  # Run it by hand from the Actions tab ("Run workflow") against ANY branch —
  # the automatic scan only fires on main, so without this a staging cleanup is
  # invisible in SonarQube until it is merged.
  workflow_dispatch:
    inputs:
      fail_on_unreachable:
        description: 'Fail the run (instead of skipping) if the SonarQube server is down'
        type: boolean
        default: false
      skip_coverage:
        description: 'Skip the test runs and scan without coverage (much faster; use only for a quick issue check)'
        type: boolean
        default: false

# A newer push supersedes an in-flight scan — no point burning ~30 min analysing
# a commit that is already stale.
concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Is the server even up? It is a manually-managed VPS container; when it is
  # down the scanner returns 502 and fails the pipeline for no good reason.
  # ---------------------------------------------------------------------------
  probe:
    name: Probe SonarQube
    runs-on: ubuntu-latest
    outputs:
      up: ${{ steps.sonar.outputs.up }}
    steps:
      - name: Check SonarQube availability
        id: sonar
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 10 "${{ secrets.SONAR_HOST_URL }}/api/server/version" || echo "000")
          if [ "$code" = "200" ]; then
            echo "up=true" >> "$GITHUB_OUTPUT"
          else
            echo "up=false" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.fail_on_unreachable }}" = "true" ]; then
              echo "::error::SonarQube server unreachable (HTTP $code)."
              exit 1
            fi
            echo "::warning::SonarQube server unreachable (HTTP $code) — skipping scan."
          fi

  # ---------------------------------------------------------------------------
  # Coverage. The scanner NEVER runs tests — it only reads the lcov each runner
  # writes (sonar.javascript.lcov.reportPaths). Without these the gate sees 0%
  # and fails new_coverage no matter how good the suites are.
  #
  # These two jobs run IN PARALLEL and hand their lcov to the analyze job as
  # artifacts. Previously everything was sequential in one job, so the mobile
  # suite waited on all 23 workspaces for no reason.
  # ---------------------------------------------------------------------------
  coverage-workspaces:
    name: Coverage — workspaces
    runs-on: ubuntu-latest
    needs: probe
    if: needs.probe.outputs.up == 'true' && !inputs.skip_coverage
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # A workspace whose OWN threshold is unmet must not veto the scan:
      # challenge-portal's 100%-line target needs its Cypress e2e coverage merged
      # in, which does not happen here. The lcov is written either way, and the
      # quality gate — not a local threshold — is what judges us.
      - name: Run coverage
        continue-on-error: true
        run: pnpm -r --if-present --no-bail test:coverage
      - name: Collect lcov
        run: |
          mkdir -p lcov-out
          find . -name 'lcov.info' -not -path '*/node_modules/*' -print0 |
            while IFS= read -r -d '' f; do
              dest="lcov-out/$(dirname "${f#./}" | tr '/' '_').info"
              cp "$f" "$dest"
            done
          ls -la lcov-out
      - uses: actions/upload-artifact@v6
        with:
          name: lcov-workspaces
          path: lcov-out
          if-no-files-found: error

  coverage-mobile:
    name: Coverage — mobile app
    runs-on: ubuntu-latest
    needs: probe
    if: needs.probe.outputs.up == 'true' && !inputs.skip_coverage
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/mobile-app/package-lock.json
      # Standalone (npm, outside the pnpm workspace).
      - name: Run coverage
        continue-on-error: true
        working-directory: app/mobile-app
        run: |
          npm ci
          npm run test:coverage
      - uses: actions/upload-artifact@v6
        with:
          name: lcov-mobile
          path: app/mobile-app/coverage/lcov.info
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # The scan itself. Needs the full history (fetch-depth: 0) for accurate
  # new-code / blame attribution.
  # ---------------------------------------------------------------------------
  analyze:
    name: Build and analyze
    runs-on: ubuntu-latest
    needs: [probe, coverage-workspaces, coverage-mobile]
    # `always()` so a skipped/failed coverage job still lets the scan run —
    # a scan without coverage beats no scan at all.
    if: always() && needs.probe.outputs.up == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # shallow clones hurt new-code relevancy

      - name: Download workspace lcov
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: lcov-workspaces
          path: lcov-out

      - name: Download mobile lcov
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: lcov-mobile
          path: app/mobile-app/coverage

      # Put each lcov back where sonar.javascript.lcov.reportPaths expects it.
      - name: Restore lcov layout
        continue-on-error: true
        run: |
          shopt -s nullglob
          for f in lcov-out/*.info; do
            dir=$(basename "$f" .info | tr '_' '/')
            mkdir -p "$dir"
            cp "$f" "$dir/lcov.info"
          done
          echo "lcov reports available to the scanner:"
          find . -name 'lcov.info' -not -path '*/node_modules/*' | sort | sed 's/^/  /'

      # SonarQube keeps a per-file analysis cache; reusing it across runs is the
      # single biggest saving on a repeat scan of the same branch.
      - name: Cache SonarQube analysis
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: sonar-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sonar-cache-${{ runner.os }}-${{ github.ref_name }}-
            sonar-cache-${{ runner.os }}-

      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          # NB: SONAR_USER_HOME is left at its default (~/.sonar) so the cache
          # step above actually hits — overriding it would silently orphan it.
          # The runner has ~16 GB. The scanner JVM holds the index; the Node
          # "bridge server" (sonar.javascript.node.maxspace in
          # sonar-project.properties) holds the TS type graph. Starve either and
          # the JS/TS sensor dies with "bridge server is unresponsive" after ~25
          # minutes, publishing nothing.
          SONAR_SCANNER_JAVA_OPTS: -Xmx4096m
