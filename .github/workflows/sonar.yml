name: SonarQube Scan

on:
  push:
    branches:
      - main
  # Run it by hand from the Actions tab ("Run workflow") against ANY branch —
  # the automatic scan only fires on main, so without this a staging cleanup is
  # invisible in SonarQube until it is merged.
  workflow_dispatch:
    inputs:
      fail_on_unreachable:
        description: 'Fail the run (instead of skipping) if the SonarQube server is down'
        type: boolean
        default: false


jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      # The SonarQube server is a manually-managed VPS container; when it is down
      # the scanner returns 502 and fails the whole pipeline. Probe it first and
      # skip (not fail) the scan when it is unreachable — a real quality gate still
      # runs and can fail whenever the server is up.
      - name: Check SonarQube availability
        id: sonar
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 10 "${{ secrets.SONAR_HOST_URL }}/api/server/version" || echo "000")
          if [ "$code" = "200" ]; then
            echo "up=true" >> "$GITHUB_OUTPUT"
          else
            echo "up=false" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.fail_on_unreachable }}" = "true" ]; then
              echo "::error::SonarQube server unreachable (HTTP $code)."
              exit 1
            fi
            echo "::warning::SonarQube server unreachable (HTTP $code) — skipping scan."
          fi
      # Coverage has to be PRODUCED before the scan: the scanner never runs the
      # tests, it only reads the lcov each runner writes
      # (sonar.javascript.lcov.reportPaths). Without this the gate sees 0%
      # coverage and fails `new_coverage` no matter how good the suites are.
      - name: Setup pnpm
        if: steps.sonar.outputs.up == 'true'
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        if: steps.sonar.outputs.up == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.sonar.outputs.up == 'true'
        run: pnpm install --frozen-lockfile

      # A workspace whose own coverage threshold is unmet (challenge-portal
      # relies on Cypress e2e coverage being merged in) must NOT block the scan:
      # the lcov is still written either way, and the gate is what judges us.
      - name: Coverage — workspaces (server, mWeb, portals, websites)
        if: steps.sonar.outputs.up == 'true'
        continue-on-error: true
        run: pnpm -r --if-present --no-bail test:coverage

      # The mobile app is standalone (npm, outside the pnpm workspace).
      - name: Coverage — mobile app
        if: steps.sonar.outputs.up == 'true'
        continue-on-error: true
        working-directory: app/mobile-app
        run: |
          npm ci
          npm run test:coverage

      - name: Report which lcov files reached the scanner
        if: steps.sonar.outputs.up == 'true'
        run: |
          echo "lcov reports found:"
          find . -name 'lcov.info' -not -path '*/node_modules/*' | sort | sed 's/^/  /'

      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        if: steps.sonar.outputs.up == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
