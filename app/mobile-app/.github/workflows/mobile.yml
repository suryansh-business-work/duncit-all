name: Duncit Mobile CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

jobs:
  quality:
    name: Lint · Typecheck · Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  e2e:
    name: Detox E2E (Android emulator)
    runs-on: ubuntu-latest
    needs: quality
    # Emulator + Detox is heavy; keep non-blocking until the runner is stabilised.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install
      - run: npx expo prebuild --platform android --no-install
      - name: Run Detox on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            npm run e2e:build
            npm run e2e:test

  android:
    name: Build Android · Upload to Slack
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install
      - run: npx expo prebuild --platform android --no-install

      - name: Build APK
        run: cd android && ./gradlew assembleRelease
      - name: Upload APK to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          npm run upload:slack -- \
            --file android/app/build/outputs/apk/release/app-release.apk \
            --status "APK ✅ ${{ github.sha }}"

      - name: Build AAB
        run: cd android && ./gradlew bundleRelease
      - name: Upload AAB to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          npm run upload:slack -- \
            --file android/app/build/outputs/bundle/release/app-release.aab \
            --status "AAB ✅ ${{ github.sha }}"

  ios:
    name: EAS iOS Build · Upload to Slack
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install

      - name: Trigger EAS iOS build and wait
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          eas build --platform ios --profile production --non-interactive --wait \
            --json > ios-build.json

      - name: Download IPA
        run: |
          URL=$(node -e "console.log(require('./ios-build.json')[0].artifacts.buildUrl)")
          curl -L "$URL" -o duncit-mobile.ipa

      - name: Upload IPA to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          npm run upload:slack -- \
            --file duncit-mobile.ipa \
            --status "IPA ✅ ${{ github.sha }}"
