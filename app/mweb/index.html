<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F82C2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Duncit" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="512x512" href="/new-duncit-logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/new-duncit-logo.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/new-duncit-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
    <title>Duncit</title>
  </head>
  <body>
    <!-- Static cold-start loader: shown instantly (no JS) and replaced by React
         on mount, so the boot wait is never a blank white screen. -->
    <div id="root">
      <div id="boot-loader" style="position:fixed;inset:0;display:grid;place-items:center;background:#fff;font-family:Quicksand,system-ui,sans-serif">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
          <div style="width:44px;height:44px;border:4px solid #f3d4d4;border-top-color:#F82C2E;border-radius:50%;animation:duncit-boot-spin .8s linear infinite"></div>
          <div style="color:#6b7280;font-weight:600;font-size:14px">Loading Duncit…</div>
        </div>
      </div>
      <style>@keyframes duncit-boot-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
