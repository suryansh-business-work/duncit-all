name: duncit

services:
  server:
    image: ${DOCKERHUB_USERNAME}/duncit-server:${IMAGE_TAG:-latest}
    container_name: duncit-server
    restart: unless-stopped
    env_file:
      - /opt/duncit/server.env
    environment:
      # Ship backend logs (console.* + GraphQL errors) to SignOz over the shared
      # signoz-net. otel.ts is gated on this var; unset = telemetry off.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4318
      OTEL_SERVICE_NAME: duncit-server
    ports:
      - "127.0.0.1:2001:2001"
    volumes:
      # Read-only Docker socket so the Tech portal's Server > Docker page can
      # list host containers (techDockerInfo). The endpoint is gated to
      # SUPER_ADMIN/TECH_MANAGER; without this mount it degrades to "unavailable".
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
      - signoz-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

  admin:
    image: ${DOCKERHUB_USERNAME}/duncit-admin:${IMAGE_TAG:-latest}
    container_name: duncit-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:2002:80"

  mweb:
    image: ${DOCKERHUB_USERNAME}/duncit-mweb:${IMAGE_TAG:-latest}
    container_name: duncit-mweb
    restart: unless-stopped
    ports:
      - "127.0.0.1:2003:80"

  website:
    image: ${DOCKERHUB_USERNAME}/duncit-website:${IMAGE_TAG:-latest}
    container_name: duncit-website
    restart: unless-stopped
    ports:
      - "127.0.0.1:2000:80"

  partners-website:
    image: ${DOCKERHUB_USERNAME}/duncit-partners-website:${IMAGE_TAG:-latest}
