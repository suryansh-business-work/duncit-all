      - "127.0.0.1:2007:80"

  track:
    image: ${DOCKERHUB_USERNAME}/duncit-track:${IMAGE_TAG:-latest}
    container_name: duncit-track
    restart: unless-stopped
    ports:
      - "127.0.0.1:2008:80"

  tech:
    image: ${DOCKERHUB_USERNAME}/duncit-tech:${IMAGE_TAG:-latest}
    container_name: duncit-tech
    restart: unless-stopped
    ports:
      - "127.0.0.1:2009:80"

  support:
    image: ${DOCKERHUB_USERNAME}/duncit-support:${IMAGE_TAG:-latest}
    container_name: duncit-support
    restart: unless-stopped
    ports:
      - "127.0.0.1:2010:80"

  website-app:
    image: ${DOCKERHUB_USERNAME}/duncit-website-app:${IMAGE_TAG:-latest}
    container_name: duncit-website-app
