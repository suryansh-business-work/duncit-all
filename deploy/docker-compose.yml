networks:
  # Implicit project network for the duncit stack.
  default:
  # SignOz's network (created by its own compose at /opt/signoz). The server
  # joins it to reach signoz-otel-collector:4318 for OTLP log export.
  signoz-net:
    external: true
    name: signoz-net
