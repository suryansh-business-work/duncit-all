# Common in-container nginx config shared by every Duncit static front-end.
# Each app Dockerfile copies this to /etc/nginx/conf.d/default.conf instead of
# keeping its own copy. It is a superset that safely serves Vite SPAs, Astro
# static sites, and the mWeb PWA from one file:
#   - `^~ /assets/` and `^~ /_astro/` win over the generic static regex so
#     content-hashed bundles keep their 1-year immutable cache.
#   - `= /sw.js` / `= /manifest.webmanifest` stay uncached for PWA updates.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA / Astro fallback for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # PWA (mweb) — never cache the service worker or manifest.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    expires 0;
  }

  # Content-hashed bundles — long immutable cache. `^~` beats the regex below.
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location ^~ /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Other static assets — medium cache.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
