# SonarQube analysis config for the Build workflow (.github/workflows/build.yml).
# SONAR_HOST_URL + SONAR_TOKEN come from GitHub secrets; this file supplies the
# mandatory projectKey the scanner was missing. The project is auto-provisioned
# on first analysis at https://sonarqube.duncit.com.
sonar.projectKey=suryansh-business-work_duncit-all_4f460a81-a423-455b-81e3-8792ab4b2046
sonar.projectName=duncit-all
sonar.sourceEncoding=UTF-8

# Scan the whole monorepo source, skipping build artefacts, deps, generated code
# and the vendored open-wa-server (third-party — we don't apply our standards to
# it, so it must not count toward the quality gate; see CLAUDE.md rule 35).
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.astro/**,**/generated/**,**/*.min.*,**/android/**,**/ios/**,pnpm-lock.yaml,portals/crm/open-wa-server/**

# Test files (kept separate from production sources in the analysis).
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.cy.ts,**/*.cy.tsx,**/__tests__/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**
