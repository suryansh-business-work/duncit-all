# SonarQube analysis config, consumed by .github/workflows/sonar.yml.
# SONAR_HOST_URL + SONAR_TOKEN come from GitHub secrets; this file supplies the
# mandatory projectKey the scanner was missing. The project is auto-provisioned
# on first analysis at https://sonarqube.duncit.com.
sonar.projectKey=suryansh-business-work_duncit-all_4f460a81-a423-455b-81e3-8792ab4b2046
sonar.projectName=duncit-all
sonar.sourceEncoding=UTF-8

# The JS/TS analyzer runs a Node "bridge server" that holds the whole type graph
# in memory. On a monorepo this size (server + mWeb + mobile + 17 portals + 5
# websites) it OOMs at Node's ~2 GB default and the scan dies with
# "The bridge server is unresponsive" after ~25 minutes, publishing nothing.
sonar.javascript.node.maxspace=8192

# Scan the whole monorepo source, skipping build artefacts, deps, generated code
# and the vendored open-wa-server (third-party — we don't apply our standards to
# it, so it must not count toward the quality gate; see CLAUDE.md rule 35).
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/cypress-artifacts/**,**/.astro/**,**/generated/**,**/*.min.*,**/android/**,**/ios/**,pnpm-lock.yaml,portals/crm/open-wa-server/**

# Test files (kept separate from production sources in the analysis).
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.cy.ts,**/*.cy.tsx,**/__tests__/**,**/e2e/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

# ---------------------------------------------------------------------------
# Coverage. Without these the quality gate sees 0% and fails `new_coverage`
# outright, no matter how good the suites are — the scanner does not run tests,
# it only reads the lcov each runner emits. sonar.yml runs `test:coverage`
# across the workspaces before scanning; every path below is produced there
# (Jest for server + mobile, Vitest v8 for mWeb/portals/websites).
# Keep this list in step with the vitest.config.ts `reportsDirectory` of each
# package — they are not uniform.
# ---------------------------------------------------------------------------
sonar.javascript.lcov.reportPaths=\
  server/coverage/lcov.info,\
  packages/utils/coverage/lcov.info,\
  packages/media-picker/coverage/lcov.info,\
  packages/regex/coverage/lcov.info,\
  packages/auth-tokens/coverage/lcov.info,\
  packages/logs/coverage/lcov.info,\
  packages/app-settings/coverage/lcov.info,\
  packages/theme/coverage/lcov.info,\
  packages/breadcrumb/coverage/lcov.info,\
  packages/ui/coverage/lcov.info,\
  packages/forms/coverage/lcov.info,\
  packages/dialogs/coverage/lcov.info,\
  packages/table/coverage/lcov.info,\
  packages/shell/coverage/lcov.info,\
  packages/user-context/coverage/lcov.info,\
  packages/category/coverage/lcov.info,\
  packages/location/coverage/lcov.info,\
  packages/geo/coverage/lcov.info,\
  packages/availability-calendar/coverage/lcov.info,\
  packages/pod-form/coverage/lcov.info,\
  packages/portal-pod-form/coverage/lcov.info,\
  packages/club-form/coverage/lcov.info,\
  app/mobile-app/coverage/lcov.info,\
  app/mweb/coverage/lcov.info,\
  portals/admin/coverage/lcov.info,\
  portals/ads-portal/coverage/lcov.info,\
  portals/ai/coverage/lcov.info,\
  portals/challenge-portal/cypress-artifacts/coverage/lcov.info,\
  portals/crm/cypress-artifacts/coverage/lcov.info,\
  portals/developers/cypress-artifacts/coverage/lcov.info,\
  portals/employee/coverage/lcov.info,\
  portals/finance/coverage/vitest/lcov.info,\
  portals/hr/coverage/lcov.info,\
  portals/legal/cypress-artifacts/coverage/lcov.info,\
  portals/marketing/coverage/lcov.info,\
  portals/onboarding/coverage/lcov.info,\
  portals/partners-app/coverage/lcov.info,\
  portals/products/coverage/lcov.info,\
  portals/support/cypress-artifacts/coverage/lcov.info,\
  portals/tech/coverage/lcov.info,\
  portals/website-app/coverage/lcov.info,\
  website/status-website/coverage/lcov.info

# Files that carry no testable logic — counting them as "uncovered" only drags
# the coverage figure down without telling us anything actionable.
sonar.coverage.exclusions=\
  **/*.config.{ts,js,mjs,cjs},\
  **/*.d.ts,\
  **/vite-env.d.ts,\
  **/main.tsx,\
  **/vitest.setup.ts,\
  **/scripts/**,\
  **/e2e/**,\
  **/__tests__/**,\
  **/*.stories.tsx,\
  server/src/graphql/**,\
  **/src/graphql/generated/**,\
  website/**/src/pages/**,\
  packages/*/src/index.ts
